<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#ffffff">
<title>Speaking Practice</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap');

  :root {
    --bg:         #f7faf9;
    --white:      #ffffff;
    --red:        #f05c6e;
    --red-dark:   #e04458;
    --red-light:  #fde8eb;
    --mint:       #6dcfb8;
    --mint-light: #e2f7f3;
    --mint-dark:  #4bb8a0;
    --gray:       #b0bec5;
    --gray-light: #eceff1;
    --text:       #37474f;
    --text-sub:   #90a4ae;
    --shadow:     rgba(55,71,79,0.10);
    --font:       'Nunito', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    -webkit-tap-highlight-color: transparent;
    overflow: hidden;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    padding: 2.2rem 1.5rem 2.4rem;
    min-height: 100dvh;
  }

  /* ── HEADER ── */
  .header { width: 100%; text-align: center; }
  .app-title {
    font-size: 1.15rem;
    font-weight: 700;
    color: var(--text);
    letter-spacing: 0.02em;
  }

  /* ── CENTER STAGE ── */
  .stage {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 1.6rem;
    width: 100%;
  }

  /* ── MIC DISPLAY (NOT a button) ── */
  .mic-wrap {
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .mic-ring {
    width: 210px;
    height: 210px;
    border-radius: 50%;
    background: var(--mint-light);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.35s ease;
  }
  .mic-ring.recording {
    background: var(--red-light);
    animation: ring-pulse 1.4s ease-in-out infinite;
  }
  .mic-ring.playing { background: var(--mint-light); }

  @keyframes ring-pulse {
    0%,100% { transform: scale(1); }
    50%      { transform: scale(1.05); }
  }

  .mic-face {
    width: 150px;
    height: 150px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--mint);
    box-shadow: 0 8px 28px rgba(109,207,184,0.45);
    transition: background 0.3s ease, box-shadow 0.3s ease;
    pointer-events: none;
  }
  .mic-face.recording {
    background: var(--red);
    box-shadow: 0 8px 32px rgba(240,92,110,0.5);
  }
  .mic-face.playing { background: var(--mint); }

  .mic-icon {
    width: 58px;
    height: 58px;
    fill: none;
    stroke: #fff;
    stroke-width: 3;
    stroke-linecap: round;
    stroke-linejoin: round;
    display: block;
  }
  .pause-icon {
    display: none;
    width: 36px;
    height: 36px;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .pause-icon span {
    display: block;
    width: 10px;
    height: 34px;
    background: #fff;
    border-radius: 4px;
  }
  .mic-face.recording .mic-icon  { display: none; }
  .mic-face.recording .pause-icon { display: flex; }

  /* ── TIMER ── */
  .timer {
    font-size: 2rem;
    font-weight: 700;
    color: var(--text);
    letter-spacing: 0.06em;
    font-variant-numeric: tabular-nums;
  }

  /* ── WAVEFORM ── */
  .waveform {
    width: 100%;
    max-width: 320px;
    height: 52px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 3px;
  }
  .wave-bar {
    width: 3.5px;
    border-radius: 2px;
    background: var(--gray-light);
    height: 3px;
    flex-shrink: 0;
  }
  .waveform.recording .wave-bar {
    background: var(--red);
    animation: wbar 0.5s ease-in-out infinite alternate;
  }
  .waveform.playing .wave-bar {
    background: var(--mint);
    animation: wbar 0.65s ease-in-out infinite alternate;
  }
  @keyframes wbar {
    from { height: var(--min-h, 3px); }
    to   { height: var(--max-h, 36px); }
  }

  /* ── PLAYBACK CARD ── */
  .playback-card {
    width: 100%;
    max-width: 340px;
    background: var(--white);
    border-radius: 20px;
    padding: 1.1rem 1.3rem 1rem;
    box-shadow: 0 4px 20px var(--shadow);
    opacity: 0;
    transform: translateY(12px);
    transition: opacity 0.35s ease, transform 0.35s ease;
    pointer-events: none;
  }
  .playback-card.visible {
    opacity: 1;
    transform: translateY(0);
    pointer-events: auto;
  }

  .progress-track {
    width: 100%;
    height: 5px;
    background: var(--gray-light);
    border-radius: 3px;
    position: relative;
    cursor: pointer;
    margin-bottom: 0.5rem;
    touch-action: none;
  }
  .progress-fill {
    height: 100%;
    background: var(--mint);
    border-radius: 3px;
    width: 0%;
    pointer-events: none;
    transition: width 0.1s linear;
  }
  .progress-thumb {
    position: absolute;
    top: 50%;
    left: 0%;
    transform: translate(-50%, -50%);
    width: 16px;
    height: 16px;
    background: var(--mint-dark);
    border-radius: 50%;
    border: 3px solid #fff;
    box-shadow: 0 1px 4px var(--shadow);
    cursor: grab;
    transition: left 0.1s linear;
  }
  .progress-thumb:active { cursor: grabbing; }

  .progress-times {
    display: flex;
    justify-content: space-between;
    font-size: 0.75rem;
    color: var(--text-sub);
    font-weight: 600;
    margin-bottom: 0.85rem;
  }

  .play-pill {
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto;
    gap: 0.45rem;
    width: 110px;
    padding: 0.55rem 0;
    border-radius: 999px;
    border: none;
    cursor: pointer;
    background: var(--mint-light);
    color: var(--mint-dark);
    font-family: var(--font);
    font-weight: 700;
    font-size: 0.88rem;
    transition: background 0.2s, transform 0.15s;
  }
  .play-pill:active { transform: scale(0.95); }
  .play-pill.stop-mode { background: var(--red-light); color: var(--red-dark); }

  /* ── BOTTOM AREA ── */
  .bottom-wrap {
    width: 100%;
    max-width: 360px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.6rem;
  }

  /* Always-visible main action button */
  .main-btn {
    width: 82%;
    max-width: 300px;
    padding: 1.05rem 1rem;
    border-radius: 999px;
    border: none;
    cursor: pointer;
    font-family: var(--font);
    font-size: 1.05rem;
    font-weight: 800;
    letter-spacing: 0.02em;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
    transition: background 0.25s ease, box-shadow 0.25s ease, transform 0.12s ease;
    -webkit-user-select: none;
    user-select: none;
  }
  .main-btn.state-idle {
    background: var(--mint);
    color: #fff;
    box-shadow: 0 6px 22px rgba(109,207,184,0.45);
  }
  .main-btn.state-recording {
    background: var(--red);
    color: #fff;
    box-shadow: 0 6px 22px rgba(240,92,110,0.42);
    animation: btn-pulse 1.4s ease-in-out infinite;
  }
  @keyframes btn-pulse {
    0%,100% { box-shadow: 0 6px 22px rgba(240,92,110,0.42); }
    50%      { box-shadow: 0 6px 34px rgba(240,92,110,0.65); }
  }
  .main-btn:active { transform: scale(0.96); }

  .status-label {
    font-size: 0.8rem;
    font-weight: 600;
    color: var(--text-sub);
    letter-spacing: 0.04em;
    text-transform: uppercase;
    transition: color 0.3s;
  }
  .status-label.recording { color: var(--red); }
  .status-label.playing   { color: var(--mint-dark); }
  .status-label.finished  { color: var(--mint-dark); }

  .error-msg {
    font-size: 0.75rem;
    color: var(--red);
    text-align: center;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .error-msg.show { opacity: 1; }

  #audioEl { display: none; }
</style>
</head>
<body>

<header class="header">
  <h1 class="app-title">Speaking Practice</h1>
</header>

<main class="stage">

  <!-- display-only circle, NOT a button -->
  <div class="mic-wrap">
    <div class="mic-ring" id="micRing">
      <div class="mic-face" id="micFace">
        <svg class="mic-icon" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
          <rect x="17" y="4" width="14" height="22" rx="7"/>
          <path d="M9 22c0 8.284 6.716 15 15 15s15-6.716 15-15"/>
          <line x1="24" y1="37" x2="24" y2="44"/>
          <line x1="17" y1="44" x2="31" y2="44"/>
        </svg>
        <div class="pause-icon"><span></span><span></span></div>
      </div>
    </div>
  </div>

  <div class="timer" id="timerDisplay">00:00</div>

  <div class="waveform" id="waveform"></div>

  <div class="playback-card" id="playbackCard">
    <div class="progress-track" id="progressTrack">
      <div class="progress-fill" id="progressFill"></div>
      <div class="progress-thumb" id="progressThumb"></div>
    </div>
    <div class="progress-times">
      <span id="timeNow">00:00</span>
      <span id="timeTot">00:00</span>
    </div>
    <button class="play-pill" id="playPill">
      <span id="playPillIcon">▶</span>
      <span id="playPillLabel">Play</span>
    </button>
  </div>

</main>

<!-- ALWAYS VISIBLE bottom button -->
<div class="bottom-wrap">
  <button class="main-btn state-idle" id="mainBtn">
    <span id="mainBtnIcon">🎤</span>
    <span id="mainBtnLabel">Start Recording</span>
  </button>
  <div class="status-label" id="statusLabel">Ready</div>
  <div class="error-msg" id="errorMsg"></div>
</div>

<audio id="audioEl"></audio>

<script>
(() => {
  const S = { IDLE:'idle', RECORDING:'recording', PLAYING:'playing', FINISHED:'finished' };
  let state = S.IDLE;

  const micRing      = document.getElementById('micRing');
  const micFace      = document.getElementById('micFace');
  const timerDisplay = document.getElementById('timerDisplay');
  const waveformEl   = document.getElementById('waveform');
  const playbackCard = document.getElementById('playbackCard');
  const progressTrack= document.getElementById('progressTrack');
  const progressFill = document.getElementById('progressFill');
  const progressThumb= document.getElementById('progressThumb');
  const timeNow      = document.getElementById('timeNow');
  const timeTot      = document.getElementById('timeTot');
  const playPill     = document.getElementById('playPill');
  const playPillIcon = document.getElementById('playPillIcon');
  const playPillLabel= document.getElementById('playPillLabel');
  const mainBtn      = document.getElementById('mainBtn');
  const mainBtnIcon  = document.getElementById('mainBtnIcon');
  const mainBtnLabel = document.getElementById('mainBtnLabel');
  const statusLabel  = document.getElementById('statusLabel');
  const errorMsg     = document.getElementById('errorMsg');
  const audioEl      = document.getElementById('audioEl');

  /* ── WAVEFORM BARS ── */
  const BAR_COUNT = 36;
  const bars = [];
  for (let i = 0; i < BAR_COUNT; i++) {
    const b = document.createElement('div');
    b.className = 'wave-bar';
    b.style.setProperty('--min-h', (3 + Math.random() * 4) + 'px');
    b.style.setProperty('--max-h', (14 + Math.random() * 28) + 'px');
    b.style.animationDelay = (i * 0.035 + Math.random() * 0.18) + 's';
    b.style.animationDuration = (0.4 + Math.random() * 0.35) + 's';
    waveformEl.appendChild(b);
    bars.push(b);
  }

  let mediaRecorder = null, audioChunks = [], currentBlob = null, currentURL = null;
  let timerInterval = null, recSeconds = 0;
  let audioCtx = null, analyser = null, sourceNode = null, vizRaf = null, dataArray = null;

  const fmt = s => String(Math.floor(s/60)).padStart(2,'0') + ':' + String(Math.floor(s%60)).padStart(2,'0');

  function revokeURL() {
    if (currentURL) { URL.revokeObjectURL(currentURL); currentURL = null; }
    currentBlob = null; audioEl.src = '';
  }

  function setError(msg) {
    errorMsg.textContent = msg; errorMsg.classList.add('show');
    setTimeout(() => errorMsg.classList.remove('show'), 4000);
  }

  function setWaveMode(mode) {
    waveformEl.className = 'waveform ' + mode;
    if (mode === 'idle' || mode === 'finished') bars.forEach(b => b.style.height = '3px');
  }

  function startViz() {
    if (!analyser) return;
    const draw = () => {
      vizRaf = requestAnimationFrame(draw);
      analyser.getByteFrequencyData(dataArray);
      const bk = Math.floor(dataArray.length / BAR_COUNT);
      for (let i = 0; i < BAR_COUNT; i++) {
        let s = 0;
        for (let j = 0; j < bk; j++) s += dataArray[i*bk+j];
        bars[i].style.height = Math.max(3, (s/bk/255)*46) + 'px';
      }
    };
    draw();
  }
  function stopViz() { if (vizRaf) { cancelAnimationFrame(vizRaf); vizRaf = null; } }

  async function startRecording() {
    try {
      revokeURL(); audioChunks = [];
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });

      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      analyser = audioCtx.createAnalyser(); analyser.fftSize = 256;
      dataArray = new Uint8Array(analyser.frequencyBinCount);
      sourceNode = audioCtx.createMediaStreamSource(stream);
      sourceNode.connect(analyser);

      const mime = MediaRecorder.isTypeSupported('audio/webm;codecs=opus') ? 'audio/webm;codecs=opus'
        : MediaRecorder.isTypeSupported('audio/ogg;codecs=opus') ? 'audio/ogg;codecs=opus' : 'audio/webm';
      mediaRecorder = new MediaRecorder(stream, { mimeType: mime });
      mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
      mediaRecorder.onstop = onRecordStop;
      mediaRecorder.start(100);

      setState(S.RECORDING);
      recSeconds = 0; timerDisplay.textContent = fmt(0);
      timerInterval = setInterval(() => { recSeconds++; timerDisplay.textContent = fmt(recSeconds); }, 1000);
      setWaveMode('recording'); startViz();

    } catch (err) {
      console.error(err);
      setError('Microphone access denied. Please allow mic and try again.');
    }
  }

  function stopRecording() {
    if (mediaRecorder && mediaRecorder.state !== 'inactive') {
      mediaRecorder.stop();
      mediaRecorder.stream.getTracks().forEach(t => t.stop());
    }
    clearInterval(timerInterval); stopViz();
    if (audioCtx) { audioCtx.close(); audioCtx = null; }
    setWaveMode('idle');
  }

  function onRecordStop() {
    currentBlob = new Blob(audioChunks, { type: mediaRecorder.mimeType });
    audioChunks = [];
    currentURL = URL.createObjectURL(currentBlob);
    audioEl.src = currentURL; audioEl.load();
    audioEl.oncanplaythrough = () => {
      audioEl.oncanplaythrough = null;
      timeTot.textContent = fmt(audioEl.duration || 0);
      playbackCard.classList.add('visible');
      audioEl.play().catch(console.warn);
    };
  }

  audioEl.onplay = () => { setState(S.PLAYING); setWaveMode('playing'); updatePlayPill(); };
  audioEl.onpause = audioEl.onended = () => {
    if (state === S.PLAYING) { setState(S.FINISHED); setWaveMode('finished'); }
    updatePlayPill();
    if (audioEl.ended) {
      progressFill.style.width = '100%'; progressThumb.style.left = '100%';
      timeNow.textContent = timeTot.textContent;
    }
  };
  audioEl.ontimeupdate = () => {
    const pct = Math.min((audioEl.currentTime / (audioEl.duration || 1)) * 100, 100);
    progressFill.style.width = pct + '%'; progressThumb.style.left = pct + '%';
    timeNow.textContent = fmt(audioEl.currentTime);
  };

  function updatePlayPill() {
    if (state === S.PLAYING) {
      playPillIcon.textContent = '■'; playPillLabel.textContent = 'Stop';
      playPill.classList.add('stop-mode');
    } else {
      playPillIcon.textContent = '▶';
      playPillLabel.textContent = state === S.FINISHED ? 'Replay' : 'Play';
      playPill.classList.remove('stop-mode');
    }
  }

  playPill.addEventListener('click', () => {
    if (!currentURL) return;
    if (state === S.PLAYING) audioEl.pause();
    else { audioEl.currentTime = audioEl.ended ? 0 : audioEl.currentTime; audioEl.play().catch(console.warn); }
  });

  /* progress drag */
  let dragging = false;
  function seekX(x) {
    const rect = progressTrack.getBoundingClientRect();
    const pct = Math.max(0, Math.min(1, (x - rect.left) / rect.width));
    audioEl.currentTime = pct * (audioEl.duration || 0);
    progressFill.style.width = (pct*100)+'%'; progressThumb.style.left = (pct*100)+'%';
    timeNow.textContent = fmt(audioEl.currentTime);
  }
  progressTrack.addEventListener('pointerdown', e => { if (!currentURL) return; dragging=true; progressTrack.setPointerCapture(e.pointerId); seekX(e.clientX); });
  progressTrack.addEventListener('pointermove', e => { if (dragging) seekX(e.clientX); });
  progressTrack.addEventListener('pointerup', () => { dragging = false; });

  function setState(s) {
    state = s;
    const labels = { idle:'Ready', recording:'Recording...', playing:'Playing...', finished:'Finished' };
    statusLabel.textContent = labels[s];
    statusLabel.className = 'status-label ' + (s !== S.IDLE ? s : '');

    // circle display
    if (s === S.RECORDING) {
      micFace.classList.add('recording'); micFace.classList.remove('playing');
      micRing.classList.add('recording'); micRing.classList.remove('playing');
    } else if (s === S.PLAYING) {
      micFace.classList.remove('recording'); micFace.classList.add('playing');
      micRing.classList.remove('recording'); micRing.classList.add('playing');
    } else {
      micFace.classList.remove('recording','playing');
      micRing.classList.remove('recording','playing');
    }

    // main button (always visible, just changes label/color)
    if (s === S.RECORDING) {
      mainBtn.className = 'main-btn state-recording';
      mainBtnIcon.textContent = '■';
      mainBtnLabel.textContent = 'Stop Recording';
    } else {
      mainBtn.className = 'main-btn state-idle';
      mainBtnIcon.textContent = '🎤';
      mainBtnLabel.textContent = s === S.FINISHED || s === S.PLAYING ? 'New Recording' : 'Start Recording';
    }

    if (s === S.IDLE) {
      timerDisplay.textContent = '00:00';
      playbackCard.classList.remove('visible');
    }
    updatePlayPill();
  }

  mainBtn.addEventListener('click', () => {
    if (state === S.RECORDING) {
      stopRecording();
    } else {
      if (state === S.PLAYING || state === S.FINISHED) { audioEl.pause(); audioEl.currentTime = 0; }
      startRecording();
    }
  });

  window.addEventListener('beforeunload', () => {
    revokeURL();
    if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stream.getTracks().forEach(t => t.stop());
    if (audioCtx) audioCtx.close();
  });

  setState(S.IDLE);
})();
</script>
</body>
</html>
